name: QA Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # qa-check.mjsの差分検出（変更ページの先頭表示）用に直前コミットも取得

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start production server
        run: |
          npx next start -p 3000 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Server is up"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done

      - name: Run QA check
        run: npm run qa:live

      - name: Stop server
        if: always()
        run: pkill -f "next start" || true
